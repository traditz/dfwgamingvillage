<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="DFW Gaming Village - Gallery" />
    <meta name="description" content="Photos from DFW Gaming Village events, game nights, and conventions across North Texas.">
    <meta property="og:description" content="Photos from our events!" />
    <meta property="og:image" content="https://www.dfwgamingvillage.com/banner_cropped.png" />
    <meta property="og:url" content="https://www.dfwgamingvillage.com/gallery.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.dfwgamingvillage.com/banner.png" />
    <title>DFW Gaming Village - Gallery</title>
    <link rel="stylesheet" href="community.css?v=20260622-cleanup">
    <link rel="icon" href="favicon.ico">
</head>
<body data-page="gallery">
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="join.html">Join the Community</a>
        <a href="gallery.html">Gallery</a>
        <a href="games.html">Game Library</a>
        <a href="events.html">Events</a>
        <a href="utilities.html">Utilities</a>
        <a href="player-aids.html">Player Aids</a>
        <a href="donate.html">Donate</a>
        <a href="supporters.html">Supporters</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="banner">
        <img src="banner.png" alt="DFW Gaming Village Banner">
    </div>
    <main class="content">
        <h1>Gallery</h1>
        <p>Check out some photos from past events!</p>
        <div class="cta-row">
            <button type="button" id="shuffle-btn" class="secondary-button">Show me different photos</button>
        </div>
        <div class="gallery" id="gallery"></div>
    </main>
    <div class="modal" id="imageModal" onclick="closeModal()">
        <img id="modalImg" src="" alt="DFW Gaming Village event photo">
    </div>
    <footer class="footer">
        <p>&copy; 2026 DFW Gaming Village. All Rights Reserved.</p>
    </footer>

    <script>
        // Photos are listed live from a Google Drive folder by the Cloudflare
        // Worker (see BGG-API.md / cloudflare/bgg-proxy). Just drop images in the
        // folder and they appear here automatically.
        const PROD_PROXY = "https://dfwgv-bgg-proxy.joemsprague.workers.dev";
        const IS_LOCAL = ["localhost", "127.0.0.1"].includes(location.hostname);
        const GALLERY_API = (IS_LOCAL ? "" : PROD_PROXY) + "/api/gallery";
        const SHOW_COUNT = 9;

        let allFiles = [];

        function driveImg(id, size) {
            return `https://lh3.googleusercontent.com/d/${id}=w${size}`;
        }

        function shuffle(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function render() {
            const gallery = document.getElementById("gallery");
            if (!allFiles.length) {
                gallery.innerHTML = "<p style='color:#c8c8d0;'>No photos yet — check back soon!</p>";
                return;
            }
            const picks = shuffle(allFiles).slice(0, SHOW_COUNT);
            gallery.innerHTML = "";
            picks.forEach(file => {
                const img = document.createElement("img");
                img.src = driveImg(file.id, 800);
                img.alt = "DFW Gaming Village event photo";
                img.loading = "lazy";
                img.addEventListener("click", () => openModal(file.id));
                gallery.appendChild(img);
            });
        }

        async function loadGallery() {
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "<p style='color:#c8c8d0;'>Loading photos…</p>";
            try {
                const res = await fetch(GALLERY_API);
                if (!res.ok) throw new Error(`status ${res.status}`);
                const data = await res.json();
                allFiles = data.files || [];
                render();
            } catch (err) {
                gallery.innerHTML = "<p style='color:#ff8a8a;'>Couldn't load the gallery right now. Please try again later.</p>";
                console.error("Gallery load failed:", err);
            }
        }

        function openModal(id) {
            document.getElementById("modalImg").src = driveImg(id, 1600);
            document.getElementById("imageModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("imageModal").style.display = "none";
            document.getElementById("modalImg").src = "";
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeModal();
        });
        document.getElementById("shuffle-btn").addEventListener("click", render);
        window.addEventListener("DOMContentLoaded", loadGallery);
    </script>
    <script src="site-analytics.js?v=20260607-analytics"></script>
</body>
</html>
