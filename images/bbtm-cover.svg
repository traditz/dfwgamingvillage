<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Blood Bowl: Team Manager — The Card Game">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241f1b"/>
      <stop offset="0.5" stop-color="#171310"/>
      <stop offset="1" stop-color="#0f0c0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="62%">
      <stop offset="0" stop-color="#3a2a22" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#3a2a22" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6534a"/>
      <stop offset="1" stop-color="#a4242a"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- pitch yard-lines -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="3">
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="250" y1="0" x2="250" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="550" y1="0" x2="550" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- centre hashes -->
  <g stroke="#e8b54a" stroke-opacity="0.16" stroke-width="3">
    <line x1="380" y1="300" x2="420" y2="300"/>
    <line x1="370" y1="270" x2="430" y2="270"/>
    <line x1="370" y1="330" x2="430" y2="330"/>
  </g>

  <!-- crossed-weapons + ball crest -->
  <g transform="translate(400,150)" filter="url(#sh)">
    <g stroke="#c9bdae" stroke-width="9" stroke-linecap="round" opacity="0.85">
      <line x1="-54" y1="34" x2="40" y2="-44"/>
      <line x1="54" y1="34" x2="-40" y2="-44"/>
    </g>
    <ellipse cx="0" cy="6" rx="34" ry="44" fill="#5a3417" stroke="#2f1c0c" stroke-width="4"/>
    <path d="M0,-30 L0,42 M-22,6 L22,6 M-18,-10 L18,-10 M-18,22 L18,22" stroke="#e9d8b8" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- title -->
  <g text-anchor="middle" font-family="Arial Black, Arial, sans-serif">
    <text x="400" y="320" font-size="92" font-weight="900" font-style="italic"
          fill="url(#blood)" stroke="#5a1614" stroke-width="2" filter="url(#sh)">BLOOD BOWL</text>
    <text x="400" y="372" font-size="33" font-weight="800" letter-spacing="7" fill="#e8b54a">TEAM MANAGER</text>
    <text x="400" y="406" font-size="18" font-weight="700" letter-spacing="9" fill="#c9bdae">THE CARD GAME</text>
  </g>

  <!-- accent bar + edition tag -->
  <rect x="330" y="430" width="140" height="4" rx="2" fill="#a4242a"/>
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="20"
        font-weight="800" letter-spacing="4" fill="#7fae3a">LEGENDARY EDITION</text>
  <text x="400" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="16"
        fill="#8c8073" letter-spacing="2">SETUP UTILITY &amp; REFERENCE</text>
</svg>
