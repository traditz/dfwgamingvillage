<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Arkham Horror — Setup & Reference">
  <defs>
    <radialGradient id="ah-bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#16240f"/>
      <stop offset="55%" stop-color="#0c140b"/>
      <stop offset="100%" stop-color="#05080a"/>
    </radialGradient>
    <radialGradient id="ah-gate" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dff5b0"/>
      <stop offset="35%" stop-color="#7cae3f"/>
      <stop offset="70%" stop-color="#2f5a1f"/>
      <stop offset="100%" stop-color="#0c140b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ah-title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f3f7e6"/>
      <stop offset="50%" stop-color="#d8b45c"/>
      <stop offset="100%" stop-color="#cfe0b8"/>
    </linearGradient>
    <filter id="ah-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#ah-bg)"/>

  <!-- starfield -->
  <g fill="#cfe0b8" opacity="0.5">
    <circle cx="90" cy="70" r="1.4"/><circle cx="180" cy="130" r="1"/><circle cx="700" cy="90" r="1.5"/>
    <circle cx="640" cy="180" r="1"/><circle cx="120" cy="440" r="1.2"/><circle cx="730" cy="470" r="1.3"/>
    <circle cx="60" cy="300" r="1"/><circle cx="760" cy="320" r="1"/><circle cx="300" cy="60" r="1"/>
    <circle cx="500" cy="70" r="1.1"/>
  </g>

  <!-- dimensional gate -->
  <g transform="translate(400 268)">
    <circle r="150" fill="url(#ah-gate)" opacity="0.85"/>
    <g fill="none" stroke="#9fd45c" filter="url(#ah-glow)">
      <circle r="120" stroke-width="2.5" opacity="0.85"/>
      <circle r="92" stroke-width="2" opacity="0.7"/>
      <circle r="64" stroke-width="2" opacity="0.6" stroke-dasharray="10 8"/>
    </g>
    <!-- tentacles curling out of the gate -->
    <g fill="none" stroke="#1f3a14" stroke-width="9" stroke-linecap="round" opacity="0.9">
      <path d="M0 0 C 60 -30 120 -10 160 -70 C 185 -110 150 -150 120 -150"/>
      <path d="M0 0 C -50 40 -130 30 -165 95 C -190 140 -150 175 -120 168"/>
      <path d="M0 0 C 70 30 150 60 175 130"/>
      <path d="M0 0 C -60 -40 -140 -50 -170 -120"/>
    </g>
    <g fill="none" stroke="#5d8a2c" stroke-width="3.5" stroke-linecap="round" opacity="0.8">
      <path d="M0 0 C 60 -30 120 -10 160 -70 C 185 -110 150 -150 120 -150"/>
      <path d="M0 0 C -50 40 -130 30 -165 95 C -190 140 -150 175 -120 168"/>
    </g>
    <!-- the watching eye -->
    <ellipse rx="46" ry="26" fill="#06100a" stroke="#d8b45c" stroke-width="2.5"/>
    <circle r="15" fill="#d8b45c"/>
    <circle r="6" fill="#06100a"/>
  </g>

  <!-- title plate -->
  <text x="400" y="470" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" letter-spacing="4" fill="url(#ah-title)">ARKHAM HORROR</text>
  <text x="400" y="508" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="20" letter-spacing="8" fill="#9fd45c">SECOND&#160;&#160;EDITION</text>
  <rect x="300" y="528" width="200" height="2" fill="#d8b45c" opacity="0.7"/>
  <text x="400" y="560" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="22" letter-spacing="3" fill="#e6ebe0">Setup &amp; Reference Utility</text>
</svg>
