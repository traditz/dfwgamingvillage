<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Analytics - DFW Gaming Village</title>
    <link rel="stylesheet" href="community.css?v=20260622-cleanup">
    <link rel="stylesheet" href="analytics.css?v=20260630">
    <link rel="icon" href="favicon.ico">
</head>
<body data-page="analytics">
    <main class="analytics-shell">
        <header class="analytics-header">
            <h1>DFW Gaming Village Analytics</h1>
            <p>Private page-view dashboard for site traffic, top pages, referrers, countries, campaigns, and recent views.</p>
        </header>

        <section class="analytics-panel analytics-login" id="login-panel">
            <form id="login-form">
                <label for="admin-token">Admin token</label>
                <input id="admin-token" type="password" autocomplete="current-password" placeholder="Enter your private analytics token">
                <div class="analytics-actions">
                    <button class="primary-button" type="submit">View Analytics</button>
                    <a class="secondary-button" href="index.html">Back To Site</a>
                </div>
            </form>
        </section>

        <section class="analytics-dashboard" id="analytics-dashboard" hidden>
            <div class="analytics-panel">
                <div class="analytics-controls">
                    <label for="range-select">Range</label>
                    <select id="range-select">
                        <option value="24h">Last 24 hours</option>
                        <option value="7d" selected>Last 7 days</option>
                        <option value="30d">Last 30 days</option>
                        <option value="90d">Last 90 days</option>
                    </select>
                    <button class="secondary-button" id="refresh-button" type="button">Refresh</button>
                    <button class="secondary-button" id="logout-button" type="button">Lock</button>
                </div>

                <div class="metric-grid">
                    <article class="metric-card">
                        <div class="metric-label">Views</div>
                        <div class="metric-value" id="views-value">0</div>
                    </article>
                    <article class="metric-card">
                        <div class="metric-label">Sessions</div>
                        <div class="metric-value" id="sessions-value">0</div>
                    </article>
                    <article class="metric-card">
                        <div class="metric-label">Pages Viewed</div>
                        <div class="metric-value" id="pages-value">0</div>
                    </article>
                </div>

                <div class="analytics-grid">
                    <article class="analytics-card">
                        <h2>Top Pages</h2>
                        <input class="page-filter" id="page-filter" type="search" placeholder="Filter pages (e.g. bsg-setup)" autocomplete="off">
                        <div class="bar-list" id="top-pages-list"></div>
                    </article>
                    <article class="analytics-card">
                        <h2>Referrers</h2>
                        <div class="bar-list" id="referrers-list"></div>
                    </article>
                    <article class="analytics-card">
                        <h2>Countries</h2>
                        <div class="bar-list" id="countries-list"></div>
                    </article>
                    <article class="analytics-card">
                        <h2>Campaigns</h2>
                        <div class="bar-list" id="campaigns-list"></div>
                    </article>
                    <article class="analytics-card full-width">
                        <h2>Recent Views</h2>
                        <table class="analytics-table">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Page</th>
                                    <th>Country</th>
                                    <th>Referrer</th>
                                </tr>
                            </thead>
                            <tbody id="recent-body"></tbody>
                        </table>
                    </article>
                </div>
            </div>
        </section>

        <p class="analytics-status" id="analytics-status"></p>
    </main>

    <script src="analytics-dashboard.js?v=20260630"></script>
    <script src="site-analytics.js?v=20260607-analytics"></script>
</body>
</html>
