<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Party Seat Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9HojHKuf40kiDhvWtn1W5B06aaBxKXxg",
            authDomain: "lan-select-a-seat.firebaseapp.com",
            databaseURL: "https://lan-select-a-seat-default-rtdb.firebaseio.com",
            projectId: "lan-select-a-seat",
            storageBucket: "lan-select-a-seat.firebasestorage.app",
            messagingSenderId: "87462297552",
            appId: "1:87462297552:web:4cb23b8863f93cb5d043d5",
            measurementId: "G-9QHQV42QEZ"
        };

        const DISCORD_CLIENT_ID = '1337483861870575637'; 
        const ADMIN_IDS = ['191733599916130314', '172758922417930240'];
        const REDIRECT_URI = 'https://traditz.github.io/dfwgamingvillage/selectaseat.html';

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        window.lanApp = () => ({
            user: null,
            isAdmin: false,
            currentLan: localStorage.getItem('last_lan') || '',
            allLans: [],
            seats: {},
            selection: null,
            loading: true,

            async init() {
                const fragment = new URLSearchParams(window.location.hash.slice(1));
                if (fragment.has('access_token')) {
                    const res = await fetch('https://discord.com/api/users/@me', {
                        headers: { authorization: `Bearer ${fragment.get('access_token')}` }
                    });
                    const data = await res.json();
                    this.user = { id: data.id, username: data.username, avatar: `https://cdn.discordapp.com/avatars/${data.id}/${data.avatar}.png` };
                    localStorage.setItem('lan_user', JSON.stringify(this.user));
                    await signInAnonymously(auth);
                    window.location.hash = "";
                } else {
                    const savedUser = localStorage.getItem('lan_user');
                    if (savedUser) {
                        this.user = JSON.parse(savedUser);
                        await signInAnonymously(auth);
                    }
                }

                if (this.user && ADMIN_IDS.includes(this.user.id)) this.isAdmin = true;

                // Listen for LAN changes
                onValue(ref(db, 'lans'), (snapshot) => {
                    const data = snapshot.val() || {};
                    this.allLans = Object.keys(data);
                    
                    if (this.allLans.length > 0) {
                        if (!this.currentLan || !this.allLans.includes(this.currentLan)) {
                            this.currentLan = this.allLans[0];
                        }
                        this.seats = data[this.currentLan]?.seats || {};
                    }
                    this.loading = false;
                });
            },

            login() {
                const uri = encodeURIComponent(REDIRECT_URI);
                window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${uri}&response_type=token&scope=identify`;
            },

            async confirmSelection() {
                if (!this.user) return this.login();
                await set(ref(db, `lans/${this.currentLan}/seats/${this.selection}`), {
                    username: this.user.username,
                    avatar: this.user.avatar,
                    id: this.user.id
                });
                this.selection = null;
            },

            async kickUser(id) {
                if (confirm(`Kick player from ${id}?`)) {
                    await remove(ref(db, `lans/${this.currentLan}/seats/${id}`));
                }
            },

            async createNewLAN() {
                const name = prompt("New Event Name (e.g. Winter_Bash):");
                if (!name) return;
                const clean = name.replace(/\s+/g, '_');
                const base = { 1:null, 2:null, 3:null, 4:null, 5:null, 6:null, 7:null, 8:null, U1:null, U2:null, U3:null, U4:null };
                await set(ref(db, `lans/${clean}/seats`), base);
                this.changeLan(clean);
            },

            changeLan(name) {
                this.currentLan = name;
                localStorage.setItem('last_lan', name);
                location.reload(); // Refresh to ensure clean state
            },

            logout() {
                localStorage.removeItem('lan_user');
                location.reload();
            }
        });
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style> .table-wall { border-top: 6px solid #334155; } </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-10" x-data="lanApp()" x-init="init()">

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-black text-indigo-500 tracking-tighter" x-text="currentLan ? currentLan.replace(/_/g,' ') : 'No Active Event'"></h1>
            <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">LAN Village Seating</p>
        </div>
        <template x-if="user">
            <div class="flex items-center gap-4 bg-slate-800 p-2 pr-4 rounded-full border border-slate-700">
                <img :src="user.avatar" class="w-8 h-8 rounded-full border border-indigo-500">
                <span class="text-sm font-bold" x-text="user.username"></span>
                <button @click="logout()" class="text-[10px] text-slate-500 hover:text-white ml-2 uppercase">Logout</button>
            </div>
        </template>
        <template x-if="!user">
            <button @click="login()" class="bg-[#5865F2] px-6 py-2 rounded-lg font-bold">Login with Discord</button>
        </template>
    </header>

    <template x-if="isAdmin">
        <div class="max-w-5xl mx-auto mb-10 bg-indigo-900/20 border border-indigo-500/30 p-4 rounded-2xl flex justify-between items-center">
            <button @click="createNewLAN()" class="bg-indigo-600 px-4 py-2 rounded-lg text-xs font-bold transition hover:bg-indigo-500">CREATE NEW EVENT</button>
            <div class="flex items-center gap-3">
                <span class="text-xs text-slate-400">Switch Event:</span>
                <select @change="changeLan($event.target.value)" class="bg-slate-800 text-xs border border-slate-700 rounded px-3 py-1.5 outline-none">
                    <template x-for="lan in allLans">
                        <option :value="lan" x-text="lan.replace(/_/g,' ')" :selected="lan === currentLan"></option>
                    </template>
                </select>
            </div>
        </div>
    </template>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-12" x-show="!loading">
        <div class="lg:col-span-3 space-y-24 bg-slate-800/40 p-10 rounded-3xl border border-slate-700 relative shadow-2xl">
            <h3 class="absolute top-4 left-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">Area 1</h3>
            <div class="grid grid-cols-4 gap-6 table-wall pt-8">
                <template x-for="id in [1,2,3,4]">
                    <div class="relative group">
                        <button @click="if(!seats[id]) selection = id" :class="seats[id] ? 'bg-slate-900' : (selection == id ? 'bg-indigo-600 border-indigo-400' : 'bg-slate-800 border-slate-700 hover:border-indigo-500')" class="w-full h-24 rounded-2xl border-2 transition-all flex items-center justify-center overflow-hidden">
                            <template x-if="seats[id]"><img :src="seats[id].avatar" class="w-full h-full object-cover"></template>
                            <template x-if="!seats[id]"><span class="text-2xl font-black text-slate-600" x-text="id"></span></template>
                        </button>
                        <template x-if="isAdmin && seats[id]"><button @click="kickUser(id)" class="absolute -top-2 -right-2 bg-red-600 w-6 h-6 rounded-full text-xs font-bold border-2 border-slate-900">✕</button></template>
                    </div>
                </template>
            </div>
            <div class="grid grid-cols-4 gap-6 border-b-4 border-slate-700 pb-8">
                <template x-for="id in [5,6,7,8]">
                    <div class="relative group">
                        <button @click="if(!seats[id]) selection = id" :class="seats[id] ? 'bg-slate-900' : (selection == id ? 'bg-indigo-600 border-indigo-400' : 'bg-slate-800 border-slate-700 hover:border-indigo-500')" class="w-full h-24 rounded-2xl border-2 transition-all flex items-center justify-center overflow-hidden">
                            <template x-if="seats[id]"><img :src="seats[id].avatar" class="w-full h-full object-cover"></template>
                            <template x-if="!seats[id]"><span class="text-2xl font-black text-slate-600" x-text="id"></span></template>
                        </button>
                        <template x-if="isAdmin && seats[id]"><button @click="kickUser(id)" class="absolute -top-2 -right-2 bg-red-600 w-6 h-6 rounded-full text-xs font-bold border-2 border-slate-900">✕</button></template>
                    </div>
                </template>
            </div>
        </div>

        <div class="bg-slate-800/40 p-8 rounded-3xl border border-slate-700 relative h-fit">
            <h3 class="absolute top-4 left-6 text-[10px] font-black text-amber-500/60 uppercase tracking-widest">Area 2: Upstairs</h3>
            <div class="grid grid-cols-1 gap-6 table-wall pt-8">
                <template x-for="id in ['U1','U2','U3','U4']">
                    <div class="relative group">
                        <button @click="if(!seats[id]) selection = id" :class="seats[id] ? 'bg-slate-900' : (selection == id ? 'bg-indigo-600 border-indigo-400' : 'bg-slate-800 border-slate-700 hover:border-indigo-500')" class="w-full h-20 rounded-2xl border-2 transition-all flex items-center justify-center overflow-hidden">
                            <template x-if="seats[id]"><img :src="seats[id].avatar" class="w-full h-full object-cover"></template>
                            <template x-if="!seats[id]"><span class="text-2xl font-black text-slate-600" x-text="id"></span></template>
                        </button>
                        <template x-if="isAdmin && seats[id]"><button @click="kickUser(id)" class="absolute -top-2 -right-2 bg-red-600 w-6 h-6 rounded-full text-xs font-bold border-2 border-slate-900">✕</button></template>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <div x-show="selection" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-indigo-600 px-8 py-4 rounded-2xl shadow-2xl border border-indigo-400 flex items-center gap-8 z-50">
        <p class="font-bold">Claim Seat <span x-text="selection"></span>?</p>
        <div class="flex gap-2">
            <button @click="confirmSelection()" class="bg-white text-indigo-700 px-6 py-2 rounded-xl font-black hover:bg-slate-100 transition">CONFIRM</button>
            <button @click="selection = null" class="text-xs font-bold opacity-60">Cancel</button>
        </div>
    </div>
</body>
</html>
