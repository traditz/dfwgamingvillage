<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Party Seat Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyB9HojHKuf40kiDhvWtn1W5B06aaBxKXxg",
            authDomain: "lan-select-a-seat.firebaseapp.com",
            databaseURL: "https://lan-select-a-seat-default-rtdb.firebaseio.com/",
            projectId: "lan-select-a-seat",
            storageBucket: "lan-select-a-seat.firebasestorage.app",
            appId: "1:87462297552:web:4cb23b8863f93cb5d043d5"
        };

        const DISCORD_CLIENT_ID = '1470796344284414114';
        const ADMIN_IDS = ['191733599916130314', '172758922417930240'];

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        window.lanApp = () => ({
            user: null,
            isAdmin: false,
            currentLan: localStorage.getItem('last_lan') || 'Default_LAN',
            allLans: [],
            seats: {},
            selection: null,

            async init() {
                // Handle Discord Auth Callback
                const fragment = new URLSearchParams(window.location.hash.slice(1));
                if (fragment.has('access_token')) {
                    const res = await fetch('https://discord.com/api/users/@me', {
                        headers: { authorization: `Bearer ${fragment.get('access_token')}` }
                    });
                    const data = await res.json();
                    
                    // Store user and sign in to Firebase
                    this.user = { id: data.id, username: data.username, avatar: `https://cdn.discordapp.com/avatars/${data.id}/${data.avatar}.png` };
                    localStorage.setItem('lan_user', JSON.stringify(this.user));
                    await signInAnonymously(auth);
                    window.location.hash = "";
                } else {
                    this.user = JSON.parse(localStorage.getItem('lan_user'));
                }

                if (this.user && ADMIN_IDS.includes(this.user.id)) this.isAdmin = true;

                // Sync with Database
                onValue(ref(db, 'lans'), (snapshot) => {
                    const data = snapshot.val() || {};
                    this.allLans = Object.keys(data);
                    if (this.allLans.length > 0 && !this.allLans.includes(this.currentLan)) {
                        this.currentLan = this.allLans[0];
                    }
                    this.seats = data[this.currentLan]?.seats || {};
                });
            },

            login() {
               // This must match EXACTLY what is in your Discord Developer Portal Redirects list
                const REDIRECT_URI = 'https://traditz.github.io/dfwgamingvillage/selectaseat.html';

                const uri = encodeURIComponent(REDIRECT_URI);
                const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${uri}&response_type=token&scope=identify`;
                console.log("Redirecting to:", authUrl); // This helps you debug if it fails again
                window.location.href = authUrl;
            },

            async confirmSelection() {
                if (!this.user) return this.login();
                await set(ref(db, `lans/${this.currentLan}/seats/${this.selection}`), this.user);
                this.selection = null;
            },

            async kickUser(id) {
                if (confirm(`Remove player from seat ${id}?`)) {
                    await remove(ref(db, `lans/${this.currentLan}/seats/${id}`));
                }
            },

            async createNewLAN() {
                const name = prompt("Enter New LAN Name (e.g. Winter_2026):");
                if (!name) return;
                const base = { 1:null, 2:null, 3:null, 4:null, 5:null, 6:null, 7:null, 8:null, U1:null, U2:null, U3:null, U4:null };
                await set(ref(db, `lans/${name}/seats`), base);
                this.currentLan = name;
                localStorage.setItem('last_lan', name);
            },

            changeLan(name) {
                this.currentLan = name;
                localStorage.setItem('last_lan', name);
            }
        });
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style> .table-wall { border-top: 6px solid #334155; } </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-10 font-sans" x-data="lanApp()" x-init="init()">

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-10">
        <div>
            <h1 class="text-2xl font-black text-indigo-500 tracking-tighter" x-text="currentLan.replace('_',' ')"></h1>
            <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Seating Arrangement</p>
        </div>
        <template x-if="!user">
            <button @click="login()" class="bg-[#5865F2] hover:bg-[#4752C4] px-6 py-2 rounded-lg font-bold transition shadow-lg shadow-indigo-500/20">Login with Discord</button>
        </template>
        <template x-if="user">
            <div class="flex items-center gap-3 bg-slate-800 p-2 pr-4 rounded-full border border-slate-700">
                <img :src="user.avatar" class="w-8 h-8 rounded-full border border-indigo-500">
                <span class="text-sm font-bold" x-text="user.username"></span>
            </div>
        </template>
    </header>

    <template x-if="isAdmin">
        <div class="max-w-5xl mx-auto mb-10 bg-indigo-900/20 border border-indigo-500/30 p-4 rounded-2xl flex flex-wrap gap-4 items-center justify-between">
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Admin Tools</span>
                <button @click="createNewLAN()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-1.5 rounded-lg text-xs font-bold transition">New LAN</button>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs text-slate-400">Switch Event:</span>
                <select @change="changeLan($event.target.value)" class="bg-slate-800 text-xs border border-slate-700 rounded px-2 py-1 outline-none">
                    <template x-for="lan in allLans">
                        <option :value="lan" x-text="lan" :selected="lan === currentLan"></option>
                    </template>
                </select>
            </div>
        </div>
    </template>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-12">
        <div class="lg:col-span-3 space-y-24 bg-slate-800/40 p-10 rounded-3xl border border-slate-700 relative shadow-2xl">
            <h3 class="absolute top-4 left-6 text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Area 1: Main Hall</h3>
            
            <div class="grid grid-cols-4 gap-6 table-wall pt-8">
                <template x-for="id in [1,2,3,4]">
                    <div class="relative group">
                        <button @click="if(!seats[id]) selection = id" 
                            :class="seats[id] ? 'bg-slate-900 border-slate-800 opacity-60' : (selection === id ? 'bg-indigo-600 border-indigo-400 scale-105' : 'bg-slate-800 border-slate-700 hover:border-indigo-500/50')"
                            class="w-full h-24 rounded-2xl border-2 transition-all flex items-center justify-center overflow-hidden">
                            <template x-if="seats[id]"><img :src="seats[id].avatar" class="w-full h-full object-cover"></template>
                            <template x-if="!seats[id]"><span class="text-2xl font-black text-slate-700" x-text="id"></span></template>
                        </button>
                        <template x-if="isAdmin && seats[id]">
                            <button @click="kickUser(id)" class="absolute -top-2 -right-2 bg-red-600 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold shadow-xl border-2 border-slate-900 z-10">✕</button>
                        </template>
                    </div>
                </template>
            </div>

            <div class="grid grid-cols-4 gap-6 border-b-6 border-slate-700 pb-8">
                <template x-for="id in [5,6,7,8]">
                    <div class="relative group">
                        <button @click="if(!seats[id]) selection = id" 
                            :class="seats[id] ? 'bg-slate-900 border-slate-800 opacity-60' : (selection === id ? 'bg-indigo-600 border-indigo-400 scale-105' : 'bg-slate-800 border-slate-700 hover:border-indigo-500/50')"
                            class="w-full h-24 rounded-2xl border-2 transition-all flex items-center justify-center overflow-hidden">
                            <template x-if="seats[id]"><img :src="seats[id].avatar" class="w-full h-full object-cover"></template>
                            <template x-if="!seats[id]"><span class="text-2xl font-black text-slate-700" x-text="id"></span></template>
                        </button>
                        <template x-if="isAdmin && seats[id]">
                            <button @click="kickUser(id)" class="absolute -top-2 -right-2 bg-red-600 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold shadow-xl border-2 border-slate-900 z-10">✕</button>
                        </template>
                    </div>
                </template>
            </div>
        </div>

        <div class="bg-slate-800/40 p-8 rounded-3xl border border-slate-700 relative shadow-2xl">
            <h3 class="absolute top-4 left-6 text-[10px] font-black text-amber-500/60 uppercase tracking-[0.3em]">Area 2: Upstairs</h3>
            <div class="grid grid-cols-1 gap-6 table-wall pt-8">
                <template x-for="id in ['U1','U2','U3','U4']">
                    <div class="relative group">
                        <button @click="if(!seats[id]) selection = id" 
                            :class="seats[id] ? 'bg-slate-900 border-slate-800 opacity-60' : (selection === id ? 'bg-indigo-600 border-indigo-400 scale-105' : 'bg-slate-800 border-slate-700 hover:border-indigo-500/50')"
                            class="w-full h-20 rounded-2xl border-2 transition-all flex items-center justify-center overflow-hidden">
                            <template x-if="seats[id]"><img :src="seats[id].avatar" class="w-full h-full object-cover"></template>
                            <template x-if="!seats[id]"><span class="text-2xl font-black text-slate-700" x-text="id"></span></template>
                        </button>
                        <template x-if="isAdmin && seats[id]">
                            <button @click="kickUser(id)" class="absolute -top-2 -right-2 bg-red-600 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold shadow-xl border-2 border-slate-900 z-10">✕</button>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <div x-show="selection" x-transition class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-indigo-600 px-8 py-4 rounded-2xl shadow-2xl border border-indigo-400 flex items-center gap-8 z-50">
        <p class="font-bold">Claim Seat <span x-text="selection" class="text-indigo-200 underline"></span>?</p>
        <div class="flex gap-2">
            <button @click="confirmSelection()" class="bg-white text-indigo-700 px-6 py-2 rounded-xl font-black hover:bg-slate-100 transition shadow-lg">CLAIM STATION</button>
            <button @click="selection = null" class="text-xs font-bold uppercase tracking-widest opacity-60 hover:opacity-100">Cancel</button>
        </div>
    </div>
</body>
</html>
