<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DFWGV Events</title>
  <meta name="description" content="DFW Gaming Village game day event pages." />
  <meta name="theme-color" content="#d71920" />
  <link rel="icon" href="../dfwgv-icon.png" />
  <link rel="stylesheet" href="../styles.css?v=20260612-v4" />
  <link rel="stylesheet" href="./event.css?v=20260612-v3" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a class="logo" href="https://www.dfwgamingvillage.com/" aria-label="Go to DFW Gaming Village home">
        <img src="../dfwgv-icon.png" alt="DFW Gaming Village logo" />
      </a>
      <div>
        <div class="title">DFWGV Events</div>
        <div class="subtitle">Game day event pages</div>
      </div>
    </div>
    <nav class="topnav" aria-label="Planner navigation">
      <a href="../">Planner</a>
      <a href="./">Events</a>
      <a href="../admin/" data-admin-link hidden>Admin</a>
    </nav>
    <div class="authbar">
      <a class="btn btn-primary" href="../">Sign in to join</a>
    </div>
  </header>

  <main class="container publicShell">
    <section class="plannerHero publicHero plannerBanner" aria-label="DFW Gaming Village">
      <img src="../banner2.png" alt="DFW Gaming Village" />
    </section>

    <section class="plannerPageHeader publicPageHeader" aria-labelledby="pageTitle">
      <div class="eyebrow">Event</div>
      <h1 id="pageTitle">DFWGV Events</h1>
    </section>

    <section id="eventListView" class="card">
      <div class="cardhead">
        <h2>Events</h2>
        <a class="btn" href="../">Open Planner</a>
      </div>
      <div class="eventSection">
        <h3>Upcoming Events</h3>
        <div id="upcomingEvents" class="eventGrid"></div>
      </div>
      <div class="eventSection historySection">
        <button class="btn" id="btnPastEventsToggle" type="button" aria-expanded="false">Past Events</button>
      </div>
      <div class="eventSection pastEventsPanel" id="pastEventsPanel" hidden>
        <div id="pastEvents" class="eventGrid"></div>
      </div>
    </section>

    <section id="eventDetailView" class="eventLayout" style="display:none;">
      <section class="card eventSummary">
        <div class="cardhead">
          <h2 id="eventTitle">Game Day</h2>
          <button class="btn" id="btnShare">Share</button>
        </div>
        <div class="eventMeta" id="eventMeta"></div>
        <div class="historyNotice" id="historyNotice" style="display:none;">
          This is a past event. Tables and posts are retained here for history.
        </div>
        <div class="publicActions">
          <a class="btn btn-primary" id="btnOpenPlanner" href="../">Host or Join</a>
          <a class="btn" id="btnCalendar" href="#">Add to Calendar</a>
        </div>
      </section>

      <section class="card">
        <div class="cardhead">
          <h2>Hosted Tables</h2>
          <div class="filterbar" id="filters">
            <button class="chip is-active" data-filter="all">All</button>
            <button class="chip" data-filter="open">Open Seats</button>
            <button class="chip" data-filter="waitlist">Waitlist</button>
          </div>
        </div>
        <div id="publicTables" class="publicTables"></div>
      </section>

      <section class="card">
        <div class="cardhead">
          <h2>Want to Play</h2>
        </div>
        <div id="publicWants" class="list"></div>
      </section>
    </section>
  </main>

  <script type="module" src="./event.js?v=20260612-v3"></script>
  <script src="../../site-analytics.js?v=20260611-planner"></script>
</body>
</html>
